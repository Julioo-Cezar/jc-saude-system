<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Contato - JC Saúde System</title>

<!-- Bootstrap -->
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Ícones -->
      <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

<!-- CSS Personalizado -->
      <link rel="stylesheet" href="css/style.css">

</head>

<body>
<!-- Cabeçalho Superior -->  
 <header>
    <p>
        <i class="bi bi-telephone"></i> (61)99999-9999 | 
        <i class="bi bi-envelope-at-fill"></i> contato@jcsaude.com
    </p>
 </header>

 <!-- Navbar -->
  <nav class="navbar navbar-expand-lg bg-primary navbar-dark">
    <div class="container">
        <a class="navbar-brand" href="index.html">
            <i class="bi bi-hospital"></i> JC Saúde
        </a>
    </div>
  </nav>
  
<!-- Conteúdo Principal -->
   <main>

<!-- Seção Contato -->
    <section class="py-5">
        <div class="container">

<!-- Título -->
            <h1 class="text-center mb-5">
                Entre em Contato
            </h1>

            <div class="row align-items-center-start">

<!-- Informações da Clínica -->
                <div class="col-md-4 mb-4">

                    <div class="card shadow-sm p-4 h-100">

                        <h4 class="mb-4">
                            Informações da Clínica
                        </h4>

                        <p>
                            <i class="bi bi-telephone-fill text-primary"></i>
                            (61) 99999-9999
                        </p>

                        <p>
                            <i class="bi bi-envelope-fill text-primary"></i>
                            contato@jcsaude.com
                        </p>

                        <p>
                            <i class="bi bi-geo-alt-fill text-primary"></i>
                            Brasília - DF
                        </p>

                        <p>
                            <i class="bi bi-clock-fill text-primary"></i>
                            Seg a Sex: 08h às 18h
                        </p>

                    </div>
                  </div>           

<!-- Formulário -->
                  <div class="col-md-8 mb-4">

                   <form>                    
                        
<!-- Campo Nome -->
                        <div class="mb-3">
                            <label class="form-label">
                                Nome Completo
                            </label>
                            <input 
                            type="text" 
                            class="form-control" 
                            placeholder="Digite seu nome">
                        </div>

<!-- Campo E-mail -->
                        <div class="mb-3">
                            <label class="form-label">
                                E-mail
                            </label>
                            <input 
                            type="email" 
                            class="form-control" 
                            placeholder="Digite seu e-mail">
                        </div>

<!-- Campo Telefone -->
                        <div class="mb-3">
                            <label class="form-label">
                                Telefone
                            </label>
                            <input 
                            type="tel" 
                            class="form-control" 
                            placeholder="(61)99999-9999">
                        </div>

<!-- Campo Mensagem -->
                        <div class="mb-3">
                            <label class="form-label">
                                Mensagem
                            </label>
                            <textarea
                            class="form-control" 
                            rows="6"
                            placeholder="Digite sua mensagem">
                            </textarea>
                        </div>

<!-- Botão Enviar -->
                        <button
                        type="submit"
                        class="btn btn-primary px-4 py-2">
                         Enviar Mensagem
                        </button>

                    </form>

                </div>
              </div>
            </div>
          
    </section>
   </main>
</body>
</html>
